name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub Release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      tag_name:
        description: "Release tag, required when publish_release is true. Example: v0.1.0"
        required: false
        type: string
      release_notes:
        description: "Release changelog, required when publish_release is true"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip pyinstaller

      - name: Syntax check
        run: python -m py_compile fusion360_updater_gui.py

      - name: Build executable
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion360Updater
          path: dist/Fusion360Updater.exe
          if-no-files-found: error

      - name: Prepare manual release notes
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release == 'true' }}
        shell: pwsh
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAG_NAME)) {
            throw "tag_name is required when publish_release is true."
          }
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_NOTES)) {
            throw "release_notes is required when publish_release is true."
          }
          Set-Content -Path release-tag.txt -Value $env:TAG_NAME -Encoding UTF8
          Set-Content -Path release-notes.md -Value $env:RELEASE_NOTES -Encoding UTF8

      - name: Prepare tag release notes
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if (!(Test-Path CHANGELOG.md)) {
            throw "CHANGELOG.md is required for tag releases."
          }

          $lines = Get-Content CHANGELOG.md
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^\s*##\s+\[?$([regex]::Escape($env:TAG_NAME))\]?\s*$") {
              $start = $i
              break
            }
          }
          if ($start -lt 0) {
            throw "CHANGELOG.md must contain a '## $env:TAG_NAME' section for tag releases."
          }

          $end = $lines.Count
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^\s*##\s+") {
              $end = $i
              break
            }
          }

          $notes = $lines[($start + 1)..($end - 1)] -join "`n"
          if ([string]::IsNullOrWhiteSpace($notes)) {
            throw "CHANGELOG.md section for $env:TAG_NAME is empty."
          }
          Set-Content -Path release-tag.txt -Value $env:TAG_NAME -Encoding UTF8
          Set-Content -Path release-notes.md -Value $notes -Encoding UTF8

      - name: Create GitHub release
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_release == 'true') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = (Get-Content release-tag.txt -Raw).Trim()
          gh release create $tag dist/Fusion360Updater.exe --title $tag --notes-file release-notes.md
